version: "3.9"

services:
  # ── Hindsight Memory Server ──
  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    ports:
      - "8888:8888"
      - "9999:9999"
    environment:
      - HINDSIGHT_API_LLM_API_KEY=${HINDSIGHT_API_LLM_API_KEY}
    volumes:
      - hindsight_data:/home/hindsight/.pg0
    restart: unless-stopped

  # ── MongoDB ──
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # ── Node.js Backend ──
  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/omni-sre
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - AI_ENGINE_URL=http://ai-engine:8000
      - GITHUB_WEBHOOK_SECRET=${GITHUB_WEBHOOK_SECRET}
      - PORT=3001
    depends_on:
      - mongo
      - ai-engine
    restart: unless-stopped

  # ── Python AI Engine ──
  ai-engine:
    build: ./ai-engine
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL}
      - GROQ_FALLBACK_MODEL=${GROQ_FALLBACK_MODEL}
      - HINDSIGHT_BASE_URL=http://hindsight:8888
      - HINDSIGHT_API_LLM_API_KEY=${HINDSIGHT_API_LLM_API_KEY}
      - FASTAPI_PORT=8000
    depends_on:
      - hindsight
    restart: unless-stopped

  # ── React Frontend (dev mode) ──
  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  hindsight_data:
  mongo_data:
